<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <defs>
    <style>
      .title { fill: #FAFAFA; font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 700; }
      .subtitle { fill: #A0A0A0; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
      .layer-label { fill: #FAFAFA; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; }
      .layer-desc { fill: #A0A0A0; font-family: system-ui, -apple-system, sans-serif; font-size: 11px; }
      .arrow-label { fill: #3B82F6; font-family: system-ui, -apple-system, sans-serif; font-size: 10px; }
      .placeholder-note { fill: #666666; font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="520" fill="#0A0A0A" rx="0"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" class="title">Hermos Platform</text>
  <text x="300" y="56" text-anchor="middle" class="subtitle">Service Architecture</text>

  <!-- Layer 1: AI Layer -->
  <rect x="50" y="80" width="420" height="60" rx="8" fill="#141414" stroke="#262626" stroke-width="2"/>
  <text x="70" y="106" class="layer-label">AI Layer</text>
  <text x="70" y="124" class="layer-desc">Ollama 7b (Mac) + 14b (Windows), Quality Server</text>

  <!-- Arrow: AI -> Memory -->
  <line x1="260" y1="140" x2="260" y2="160" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="272" y="155" class="arrow-label">vector queries</text>

  <!-- Layer 2: Memory -->
  <rect x="50" y="160" width="420" height="60" rx="8" fill="#141414" stroke="#262626" stroke-width="2"/>
  <text x="70" y="186" class="layer-label">Memory</text>
  <text x="70" y="204" class="layer-desc">ChromaDB (13,659 docs) + Mem0</text>

  <!-- Arrow: AI -> Automation (from AI right side down to Automation) -->
  <line x1="260" y1="220" x2="260" y2="240" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="272" y="235" class="arrow-label">task execution</text>

  <!-- Layer 3: Automation -->
  <rect x="50" y="240" width="420" height="60" rx="8" fill="#141414" stroke="#262626" stroke-width="2"/>
  <text x="70" y="266" class="layer-label">Automation</text>
  <text x="70" y="284" class="layer-desc">n8n (29 workflows) + Agent Bridges</text>

  <!-- Arrow: Automation -> Connectivity -->
  <line x1="260" y1="300" x2="260" y2="320" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="272" y="315" class="arrow-label">external access</text>

  <!-- Layer 4: Connectivity -->
  <rect x="50" y="320" width="420" height="60" rx="8" fill="#141414" stroke="#262626" stroke-width="2"/>
  <text x="70" y="346" class="layer-label">Connectivity</text>
  <text x="70" y="364" class="layer-desc">Cloudflare Tunnel (7 endpoints) + Tailscale</text>

  <!-- Arrow: Connectivity -> Monitoring -->
  <line x1="260" y1="380" x2="260" y2="400" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 5: Monitoring -->
  <rect x="50" y="400" width="420" height="60" rx="8" fill="#141414" stroke="#262626" stroke-width="2"/>
  <text x="70" y="426" class="layer-label">Monitoring</text>
  <text x="70" y="444" class="layer-desc">Datadog Agent + GitHub Actions</text>

  <!-- Observability arrow (right side spanning all layers) -->
  <line x1="500" y1="100" x2="500" y2="440" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="510" y="275" class="arrow-label" transform="rotate(90, 510, 275)">observability</text>

  <!-- Placeholder note -->
  <text x="300" y="490" text-anchor="middle" class="placeholder-note">Placeholder -- build final version in Excalidraw, export as SVG</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
  </defs>
</svg>
